<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTalk Simple</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; background:#f5f5f5; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
  #loginBox, #chatBoxContainer { background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:300px; display:none; }
  input { width:100%; padding:8px; margin:5px 0; border:1px solid #ccc; border-radius:5px; }
  button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:5px; background:#2196F3; color:#fff; cursor:pointer; }
  #chatMessages { height:200px; overflow-y:auto; border:1px solid #ccc; padding:5px; margin-bottom:10px; background:#e8f0fe; border-radius:5px; }
  .message { margin:5px 0; }
</style>
</head>
<body>

<div id="loginBox">
  <h3>MTalk</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <label><input type="checkbox" id="rememberMe"> I won’t forget this password</label>
  <button onclick="login()">Login / Sign Up</button>
</div>

<div id="chatBoxContainer">
  <h3>MTalk Chat</h3>
  <div id="chatMessages"></div>
  <input id="messageInput" placeholder="Type your message...">
  <button onclick="sendMessage()">Send</button>
  <button onclick="logout()">Logout</button>
</div>

<script>
let ws;
let username;
let password;

function login() {
    username = document.getElementById("username").value.trim();
    password = document.getElementById("password").value.trim();
    const remember = document.getElementById("rememberMe").checked;

    if(!username || !password) { alert("Enter both username and password"); return; }

    if(remember) {
        localStorage.setItem("mtalk_user", username);
        localStorage.setItem("mtalk_pass", password);
    }

    document.getElementById("loginBox").style.display="none";
    document.getElementById("chatBoxContainer").style.display="block";

    connect();
}

function connect() {
    // For demo, using localhost, replace with your WebSocket server
    ws = new WebSocket("ws://localhost:8765");
    ws.onopen = () => {
        ws.send(JSON.stringify({type:"login", username:username, password:password}));
        addMessage("System", "Connected to server");
    };
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if(data.type==="message") {
            addMessage(data.from, data.message);
        }
    };
}

function sendMessage() {
    const msg = document.getElementById("messageInput").value.trim();
    if(!msg) return;
    ws.send(JSON.stringify({type:"message", message:msg}));
    addMessage(username, msg);
    document.getElementById("messageInput").value="";
}

function addMessage(from, message) {
    const div = document.createElement("div");
    div.className = "message";
    div.textContent = from + ": " + message;
    document.getElementById("chatMessages").appendChild(div);
    document.getElementById("chatMessages").scrollTop = document.getElementById("chatMessages").scrollHeight;
}

function logout() {
    localStorage.removeItem("mtalk_user");
    localStorage.removeItem("mtalk_pass");
    ws.close();
    document.getElementById("chatBoxContainer").style.display="none";
    document.getElementById("loginBox").style.display="block";
}

// Auto-login if "remember me" checked previously
window.onload = () => {
    const savedUser = localStorage.getItem("mtalk_user");
    const savedPass = localStorage.getItem("mtalk_pass");
    if(savedUser && savedPass) {
        document.getElementById("username").value = savedUser;
        document.getElementById("password").value = savedPass;
        document.getElementById("rememberMe").checked = true;
    }
    document.getElementById("loginBox").style.display="block";
};
</script>

</body>
</html>
